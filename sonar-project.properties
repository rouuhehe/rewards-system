#Cambiar el project key por el nombre_apellido_t1
#Poner las exclusiones de codigo que sean necesarias (Las mismas de un git ignore de python, ts, java, etc)
#Incluir la info de donde se ubican sus test y su archivo de cobertura

sonar.projectKey=Yaritza_Lopez_t1
sonar.sources=restaurant-service/src/main/java,rewards-service/src/main/java
sonar.exclusions=**/target/**, **/generated-sources/**, **/generated-test-sources/**, **/maven-status/**, **/.mvn/**, **/.idea/**, **/.git/**, **/__pycache__/**, **/*.pyc, **/.venv/**, **/tests/**
sonar.cpd.exclusions=restaurant-service/src/main/java/**/RabbitMQConfig.java,rewards-service/src/main/java/**/RabbitMQConfig.java,restaurant-service/src/test/java/**/TestcontainersConfiguration.java,rewards-service/src/test/java/**/TestcontainersConfiguration.java,restaurant-service/src/test/java/**/RabbitMQConfigTest.java,rewards-service/src/test/java/**/RabbitMQConfigTest.java
sonar.host.url=https://sonarqube.ingsoftware.lat/
sonar.token=sqa_4e296de25b56b315988b9a9dfd137d2b4f97e7c3

# CONFIGURACIÓN DE PRUEBAS Y COBERTURA
sonar.tests=restaurant-service/src/test/java,rewards-service/src/test/java
sonar.test.inclusions=**/*Test.java,**/*Tests.java
sonar.java.binaries=restaurant-service/target/classes,rewards-service/target/classes
sonar.java.test.binaries=restaurant-service/target/test-classes,rewards-service/target/test-classes

# JaCoCo XML report paths (module-specific then a wildcard fallback)
sonar.coverage.jacoco.xmlReportPaths=restaurant-service/target/site/jacoco/jacoco.xml,rewards-service/target/site/jacoco/jacoco.xml,**/target/site/jacoco/jacoco.xml

# Provide Java libraries to improve analysis precision (includes module classes and local Maven cache)
sonar.java.libraries=restaurant-service/target/classes,rewards-service/target/classes,${env.HOME}/.m2/repository/**/*.jar

# Ensure SCM blame works; run analysis from a git checkout with .git present
sonar.scm.provider=git
